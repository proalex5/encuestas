<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta con Registro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 500px; 
            margin: 50px auto; 
            padding: 20px; 
            background-color: #f4f7f6;
            color: #333;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #2c3e50; }
        .campo-correo {
            margin-bottom: 25px;
        }
        .campo-correo label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        .campo-correo input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .bloque-pregunta {
            margin-bottom: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .opcion { 
            margin: 12px 0; 
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .opcion:hover { background-color: #f9f9f9; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        label { cursor: pointer; font-size: 16px; }
        button { 
            width: 100%;
            padding: 12px; 
            background-color: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px;
        }
        button:hover { background-color: #27ae60; }
        #mensaje { 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            color: #27ae60; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Formulario de Encuesta</h2>
        
        <form id="formEncuesta">
            <div class="campo-correo">
                <label for="correoUsuario">Tu Correo Electrónico:</label>
                <input type="email" id="correoUsuario" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="bloque-pregunta">¿Qué tecnología tienes más ganas de aprender este año?</div>
            
            <div class="opcion">
                <input type="radio" id="opcion1" name="encuesta" value="React / Vue / Angular" required>
                <label for="opcion1">Frameworks Frontend (React/Vue)</label>
            </div>
            <div class="opcion">
                <input type="radio" id="opcion2" name="encuesta" value="NodeJS / Python (Backend)">
                <label for="opcion2">Desarrollo Backend (Node/Python)</label>
            </div>
            <div class="opcion">
                <input type="radio" id="opcion3" name="encuesta" value="Inteligencia Artificial / APIs">
                <label for="opcion3">Integración de IA y APIs</label>
            </div>
            <div class="opcion">
                <input type="radio" id="opcion4" name="encuesta" value="Cloud / Firebase / AWS">
                <label for="opcion4">Cloud y Bases de datos (Firebase/AWS)</label>
            </div>
            
            <button type="submit">Enviar mi voto</button>
        </form>

        <p id="mensaje"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Tus credenciales de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBkCm1pbSyFg-d9nDoMAWboOSUJSm52n88",
            authDomain: "encuestas-20eaa.firebaseapp.com",
            databaseURL: "https://encuestas-20eaa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "encuestas-20eaa",
            storageBucket: "encuestas-20eaa.firebasestorage.app",
            messagingSenderId: "380516256923",
            appId: "1:380516256923:web:a1063b569d6275c24b8a3e",
            measurementId: "G-PF1WWE259J"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Capturar el envío del formulario
        document.getElementById('formEncuesta').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Capturar los valores ingresados por el usuario
            const correoIngresado = document.getElementById('correoUsuario').value;
            const opcionSeleccionada = document.querySelector('input[name="encuesta"]:checked').value;
            const mensajeHtml = document.getElementById('mensaje');

            try {
                const votosRef = ref(db, 'votos');
                
                // Guardamos el correo junto con el voto y el timestamp
                await push(votosRef, {
                    correo: correoIngresado,
                    opcion: opcionSeleccionada,
                    timestamp: serverTimestamp()
                });

                mensajeHtml.style.color = "#27ae60";
                mensajeHtml.innerText = "¡Voto y datos registrados con éxito! 🎉";
                document.getElementById('formEncuesta').reset();
            } catch (error) {
                console.error("Error al guardar:", error);
                mensajeHtml.style.color = "#e74c3c";
                mensajeHtml.innerText = "Error al enviar los datos. Revisa la configuración.";
            }
        });
    </script>
</body>
</html>
