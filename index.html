<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Minimalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #dbdbf7; --text: #1d1d1f; --accent: #0071e3; --card: #f3e3e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 600px; }
        .card { background: var(--card); padding: 40px; border-radius: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.5px; }
        .input-group { margin-bottom: 30px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; opacity: 0.8; }
        input[type="email"] { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; transition: border 0.2s; }
        input[type="email"]:focus { border-color: var(--accent); }
        
        .question-block { margin-bottom: 35px; border-top: 1px solid #f2f2f7; padding-top: 25px; }
        .question-text { font-size: 17px; font-weight: 400; margin-bottom: 15px; }
        .options-grid { display: grid; gap: 10px; }
        .option-item { position: relative; }
        .option-item input { position: absolute; opacity: 0; }
        .option-item label { 
            display: block; padding: 12px 15px; background: #f5f5f7; border-radius: 10px; 
            cursor: pointer; transition: all 0.2s; font-weight: 400; opacity: 1; margin: 0;
        }
        .option-item input:checked + label { background: var(--accent); color: white; }

        button { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: opacity 0.2s; margin-top: 20px;
        }
        button:hover { opacity: 0.9; }
        #status { text-align: center; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Formulario de Opinión</h1>
        <form id="pollForm">
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="question-block">
                <div class="question-text">1. ¿Qué te parece el diseño minimalista?</div>
                <div class="options-grid">
                    <div class="option-item"><input type="radio" name="p1" id="p1a" value="Excelente" required><label for="p1a">Excelente</label></div>
                    <div class="option-item"><input type="radio" name="p1" id="p1b" value="Bueno"><label for="p1b">Bueno</label></div>
                    <div class="option-item"><input type="radio" name="p1" id="p1c" value="Mejorable"><label for="p1c">Mejorable</label></div>
                </div>
            </div>

            <div class="question-block">
                <div class="question-text">2. ¿Qué plataforma prefieres?</div>
                <div class="options-grid">
                    <div class="option-item"><input type="radio" name="p2" id="p2a" value="Web" required><label for="p2a">Web</label></div>
                    <div class="option-item"><input type="radio" name="p2" id="p2b" value="App"><label for="p2b">App</label></div>
                </div>
            </div>

            <button type="submit" id="btnSubmit">Enviar Respuestas</button>
        </form>
        <div id="status"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkCm1pbSyFg-d9nDoMAWboOSUJSm52n88",
        authDomain: "encuestas-20eaa.firebaseapp.com",
        databaseURL: "https://encuestas-20eaa-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "encuestas-20eaa",
        storageBucket: "encuestas-20eaa.firebasestorage.app",
        messagingSenderId: "380516256923",
        appId: "1:380516256923:web:a1063b569d6275c24b8a3e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('pollForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        // Recopilar todas las respuestas en un objeto
        const respuestas = {
            pregunta1: document.querySelector('input[name="p1"]:checked').value,
            pregunta2: document.querySelector('input[name="p2"]:checked').value,
            // Agrega aquí p3, p4... hasta p10
        };

        try {
            await push(ref(db, 'votos'), {
                correo: document.getElementById('email').value,
                respuestas: respuestas,
                timestamp: serverTimestamp() // Firebase guarda milisegundos, los convertiremos en la otra web
            });
            document.getElementById('status').innerHTML = "✨ Enviado correctamente";
            document.getElementById('pollForm').reset();
        } catch (err) {
            document.getElementById('status').innerText = "Error al enviar";
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar Respuestas";
        }
    });
</script>
</body>
</html>
