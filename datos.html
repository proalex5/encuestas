<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f5f7; padding: 40px; }
        h1 { color: #1d1d1f; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f2f2f7; }
        th { background: #0071e3; color: white; font-weight: 600; }
        tr:hover { background: #f9f9fb; }
        .timestamp { color: #86868b; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Respuestas Recibidas</h1>
    <table>
        <thead>
            <tr>
                <th>Fecha/Hora</th>
                <th>Correo</th>
                <th>Respuestas</th>
            </tr>
        </thead>
        <tbody id="tabla-datos">
            </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        
          const firebaseConfig = {
        apiKey: "AIzaSyBkCm1pbSyFg-d9nDoMAWboOSUJSm52n88",
        authDomain: "encuestas-20eaa.firebaseapp.com",
        databaseURL: "https://encuestas-20eaa-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "encuestas-20eaa",
        storageBucket: "encuestas-20eaa.firebasestorage.app",
        messagingSenderId: "380516256923",
        appId: "1:380516256923:web:a1063b569d6275c24b8a3e"
        };

        
        const app = initializeApp(firebaseConfig);

        
        const db = getDatabase(app);

        const tabla = document.getElementById('tabla-datos');

        // Escuchar datos en tiempo real
        onValue(ref(db, 'votos'), (snapshot) => {
            tabla.innerHTML = "";
            const data = snapshot.val();
            
            for (let id in data) {
                const registro = data[id];
                
                // CORRECCIÓN DEL TIMESTAMP: Convertir milisegundos a fecha legible
                const fecha = registro.timestamp ? new Date(registro.timestamp).toLocaleString() : "Sin fecha";
                
                // Convertir el objeto de respuestas a texto
                let respuestasTexto = "";
                for(let p in registro.respuestas) {
                    respuestasTexto += `<b>${p}:</b> ${registro.respuestas[p]}<br>`;
                }

                const fila = `
                    <tr>
                        <td class="timestamp">${fecha}</td>
                        <td>${registro.correo}</td>
                        <td>${respuestasTexto}</td>
                    </tr>
                `;
                tabla.innerHTML += fila;
            }
        });
    </script>
</body>
</html>
